services:
  db:
    image: postgres:17
    container_name: rsmadness-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: rsmadness
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: