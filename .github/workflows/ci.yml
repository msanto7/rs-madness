name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore API
        run: dotnet restore RSMadnessEngine/RSMadnessEngine.Api/RSMadnessEngine.Api.csproj

      - name: Build API
        run: dotnet build RSMadnessEngine/RSMadnessEngine.Api/RSMadnessEngine.Api.csproj --no-restore --configuration Release

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: RSMadnessWeb/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: RSMadnessWeb

      - name: Build frontend
        run: npm run build
        working-directory: RSMadnessWeb
